name: 质量门禁

# main 是起点骨架（含 todo!()），只验证「格式正确 + 能编译」；
# 完整门禁（clippy 零告警 + 全量测试）在学员作业 PR 上跑——补全后应全绿。
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  skeleton:
    name: 骨架编译 (${{ matrix.os }})
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: 格式检查
        run: cargo fmt --all --check
      - name: 骨架能编译
        run: cargo build --workspace

  gate:
    name: 作业门禁 (${{ matrix.os }})
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: 格式检查
        run: cargo fmt --all --check
      - name: Clippy 零告警
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: 全量测试
        run: cargo test --workspace
